<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240" role="img" aria-label="Sagoma stilizzata di un gatto">
  <title>Sagoma gatto placeholder</title>
  <rect width="320" height="240" fill="#f2c887" rx="8"/>
  <!-- Corpo -->
  <ellipse cx="160" cy="165" rx="65" ry="50" fill="#d4813a" opacity="0.8"/>
  <!-- Testa -->
  <circle cx="160" cy="100" r="45" fill="#d4813a" opacity="0.8"/>
  <!-- Orecchie -->
  <polygon points="120,65 107,35 138,60" fill="#b85c1a"/>
  <polygon points="200,65 213,35 182,60" fill="#b85c1a"/>
