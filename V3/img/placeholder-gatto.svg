  <!-- Bocca -->
  <path d="M155,114 Q160,120 165,114" fill="none" stroke="#2d1f12" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Baffi sx -->
  <line x1="155" y1="110" x2="120" y2="106" stroke="#5c3d24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="155" y1="113" x2="118" y2="113" stroke="#5c3d24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="155" y1="116" x2="120" y2="120" stroke="#5c3d24" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Baffi dx -->
  <line x1="165" y1="110" x2="200" y2="106" stroke="#5c3d24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="165" y1="113" x2="202" y2="113" stroke="#5c3d24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="165" y1="116" x2="200" y2="120" stroke="#5c3d24" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Coda -->
  <path d="M225,180 Q265,150 250,200 Q240,220 220,210" fill="#d4813a" opacity="0.8"/>
