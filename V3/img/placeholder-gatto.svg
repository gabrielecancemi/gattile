  <polygon points="120,63 111,44 134,61" fill="#f2c887"/>
  <polygon points="200,63 209,44 186,61" fill="#f2c887"/>
  <!-- Occhi -->
  <ellipse cx="143" cy="97" rx="10" ry="12" fill="#2d1f12"/>
  <ellipse cx="177" cy="97" rx="10" ry="12" fill="#2d1f12"/>
